name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Secret scan ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so Gitleaks can diff commits

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Backend tests ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          pip install --quiet \
            fastapi uvicorn aiosqlite httpx \
            pandas numpy pyarrow \
            alpaca-py yfinance \
            anthropic openai google-genai \
            pyportfolioopt

      - name: Run test suite
        working-directory: backend
        run: python run_tests.py -v

  # ── 3. Bandit SAST ──────────────────────────────────────────────────────────
  sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Bandit
        run: pip install --quiet bandit

      - name: Run Bandit
        working-directory: backend
        run: |
          bandit -r . \
            -x ./tests/ \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero \
            -f json -o bandit-report.json
          # Fail if any medium+/medium+ findings exist
          python -c "
          import json, sys
          r = json.load(open('bandit-report.json'))
          issues = r.get('results', [])
          if issues:
              for i in issues:
                  print(f\"[{i['issue_severity']}/{i['issue_confidence']}] {i['filename']}:{i['line_number']} — {i['issue_text']}\")
              sys.exit(1)
          print('Bandit: no findings')
          "

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

  # ── 4. Frontend type-check ──────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend type-check
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── 5. Frontend build ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Vite build
        working-directory: frontend
        run: npm run build
        env:
          # Suppress self-signed cert warnings in CI (no certs/ dir present)
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 6. Release tag (main branch only) ──────────────────────────────────────
  tag-release:
    name: Tag release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-tests, sast, frontend-build]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Date-based version: YYYY.MM.DD.HHMM
          echo "tag=$(date -u +'%Y.%m.%d.%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `refs/tags/${{ steps.version.outputs.tag }}`,
              sha:   context.sha,
            });
            core.info(`Tagged ${{ steps.version.outputs.tag }}`);
